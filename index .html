// ── Map initialised AFTER parcelData ──
const map = L.map('map').setView([-1.9360, 30.0613], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&#169; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
}).addTo(map);

function getLandUseColor(landuse) {
  if (!landuse) return '#D8B4FE';
  const lu = landuse.trim().toLowerCase();
  if (lu === 'commercial')  return '#7B2D2D';
  if (lu === 'residential') return '#C8A832';
  if (lu === 'wetland')     return '#ADD8E6';
  if (lu === 'openspace')   return '#39FF14';
  if (lu === 'hospital')    return '#1E90FF';
  if (lu === 'schools')     return '#800080';
  return '#999999';
}                        // all other  = grey

function parcelStyle(feature) {
  const landuse = feature.properties.landuse || '';
  return {
    fillColor: getLandUseColor(landuse),
    fillOpacity: 0.65,
    color: '#333333',
    weight: 0.8,
    opacity: 1
  };
}

// ── Popup on Click ──
function onEachFeature(feature, layer) {
  const props   = feature.properties;
  const upi     = props.upi     || 'N/A';
  const village = props.village || 'N/A';
  const landuse = props.landuse || 'Unknown';
  const areaSqM = parseFloat(props.Shape_Area || 0).toFixed(2);
  const areaHa  = (parseFloat(areaSqM) / 10000).toFixed(4);

  layer.bindPopup(`
    <div style="font-size:13px; line-height:1.8; min-width:200px;">
      <b style="font-size:14px;">&#128230; Parcel Info</b>
      <hr style="margin:4px 0;"/>
      <b>UPI:</b> ${upi}<br/>
      <b>Village:</b> ${village}<br/>
      <b>Land Use:</b> ${landuse}<br/>
      <b>Area:</b> ${areaSqM} m&#178; (${areaHa} ha)
    </div>
  `);

  layer.on('mouseover', function () { layer.setStyle({ fillOpacity: 0.9, weight: 2 }); });
  layer.on('mouseout',  function () { geojsonLayer.resetStyle(layer); });
}

// ── Render GeoJSON ──
const geojsonLayer = L.geoJSON(parcelData, {
  style: parcelStyle,
  onEachFeature: onEachFeature
}).addTo(map);

map.fitBounds(geojsonLayer.getBounds());

// ── Legend — matches exactly what is visible on the map ──
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>&#127968; Land Use</h4>
    <div class="legend-item"><span class="legend-color" style="background:#D8B4FE;"></span> Null</div>
    <div class="legend-item"><span class="legend-color" style="background:#7B2D2D;"></span> Commercial</div>
    <div class="legend-item"><span class="legend-color" style="background:#B5A642;"></span> Residential</div>
    <div class="legend-item"><span class="legend-color" style="background:#ADD8E6;"></span> Wetland</div>
    <div class="legend-item"><span class="legend-color" style="background:#39FF14;"></span> Open Space</div>
    <div class="legend-item"><span class="legend-color" style="background:#1E90FF;"></span> Hospital</div>
    <div class="legend-item"><span class="legend-color" style="background:#800080;"></span> Schools</div>
    <div class="legend-item"><span class="legend-color" style="background:#999999;"></span> All other values</div>
  `;
  return div;
};
legend.addTo(map);

// ── Map Title ──
const title = L.control({ position: 'topright' });
title.onAdd = function () {
  const div = L.DomUtil.create('div', 'map-title');
  div.innerHTML = `&#128506; Amahoro Cell Land Parcels<br/>
    <span style="font-size:11px; font-weight:normal;">
      Muhima Sector, Nyarugenge District, Kigali City
    </span>`;
  return div;
};
title.addTo(map);
